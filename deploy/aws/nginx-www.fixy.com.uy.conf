server {
    listen 80;
    server_name fixy.com.uy www.fixy.com.uy;

    root /var/www/fixy-app/current;
    index index.html;

    # Compresión (Cloudflare puede recomprimir, pero es bueno
    # tenerlo en origen por si alguien va directo).
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # Security headers básicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self)" always;

    # Assets versionados (Vite usa hash en filename) → cache 1 año, immutable.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Favicon e iconos: cache moderado.
    location = /favicon.svg {
        add_header Cache-Control "public, max-age=86400" always;
    }
    location = /icons.svg {
        add_header Cache-Control "public, max-age=86400" always;
    }

    # SPA shell: NO cachear, así un release nuevo se ve rápido.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri /index.html;
    }

    # Fallback SPA: cualquier ruta cliente devuelve index.html.
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Proxy a backend (path /api/*).
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
