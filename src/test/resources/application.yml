spring:
  datasource:
    url: jdbc:h2:mem:fixytest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false

fixy:
  security:
    username: test-ops
    password: test-pass
  openai:
    api-key: ""
    model: gpt-4.1-mini
  abuse:
    max-requests-per-window: 200
    window-seconds: 60
