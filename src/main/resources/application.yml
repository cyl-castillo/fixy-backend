server:
  port: ${PORT:8080}

spring:
  application:
    name: fixy-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/fixy;MODE=PostgreSQL;AUTO_SERVER=TRUE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
  h2:
    console:
      enabled: false

fixy:
  security:
    username: ${FIXY_OPS_USERNAME:ops}
    password: ${FIXY_OPS_PASSWORD:change-me}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4.1-mini}
