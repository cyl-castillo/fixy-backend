server:
  port: ${PORT:8080}

spring:
  application:
    name: fixy-backend
  datasource:
    url: jdbc:h2:file:./data/fixy;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

fixy:
  security:
    username: ${FIXY_OPS_USERNAME:fixy}
    password: ${FIXY_OPS_PASSWORD:fixy-ops-2026}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4.1-mini}
